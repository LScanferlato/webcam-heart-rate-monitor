<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoraggio Battito Cardiaco</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0b0e14;
    color: #e8edf5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: #89b4fa;
    margin-bottom: 0.1rem;
  }
  .sottotitolo {
    font-size: 0.7rem;
    color: #6c7086;
    margin-bottom: 0.6rem;
  }
  .layout {
    display: flex;
    gap: 0.8rem;
    width: 960px;
    max-width: 100%;
    align-items: flex-start;
  }
  .colonna-sinistra {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
    min-width: 0;
  }
  .colonna-destra {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 220px;
    flex-shrink: 0;
  }

  /* --- Video (dimensione fissa) --- */
  .contenitore-video {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    background: #111;
    width: 100%;
  }
  .contenitore-video video,
  .contenitore-video canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .contenitore-video canvas {
    position: absolute;
    top: 0; left: 0;
  }

  /* --- ECG (altezza fissa) --- */
  .ecg-monitor {
    background: #0a0a0a;
    border: 1px solid #1a3a1a;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,255,0,0.05), inset 0 0 20px rgba(0,0,0,0.5);
  }
  .ecg-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.25rem 0.6rem;
    background: #0d1a0d;
    border-bottom: 1px solid #1a3a1a;
  }
  .ecg-label {
    font-size: 0.65rem;
    color: #2a7a2a;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .ecg-bpm {
    font-size: 1.2rem;
    font-weight: 700;
    color: #33ff33;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px #33ff3366;
  }
  .ecg-bpm.in-attesa { color: #aaaa33; text-shadow: 0 0 10px #aaaa3366; }
  .ecg-bpm.nessun-volto { color: #aa3333; text-shadow: none; }
  #ecgCanvas {
    display: block;
    width: 100%;
    height: 160px;
    background: #0a0a0a;
  }

  /* --- Illuminazione --- */
  .pannello-illuminazione {
    background: #181c25;
    border-radius: 6px;
    padding: 0.5rem 0.65rem;
    border: 1px solid #252a35;
  }
  .pannello-titolo {
    font-size: 0.65rem;
    color: #6c7086;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.35rem;
  }
  .luce-riga {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.18rem 0;
    border-bottom: 1px solid #1e2230;
  }
  .luce-riga:last-child { border-bottom: none; }
  .luce-etichetta { font-size: 0.68rem; color: #888da0; }
  .luce-valore {
    font-size: 0.7rem;
    font-weight: 600;
    font-family: 'Courier New', monospace;
  }
  .luce-valore.naturale { color: #f9e2af; }
  .luce-valore.neon { color: #89b4fa; }
  .luce-valore.incandescente { color: #fab387; }
  .luce-valore.neutro { color: #a6e3a1; }
  .barra-luminosita {
    width: 100%;
    height: 3px;
    background: #1e2230;
    border-radius: 2px;
    margin: 0.2rem 0;
    overflow: hidden;
  }
  .barra-luminosita-fill {
    height: 100%;
    background: linear-gradient(90deg, #f9e2af, #f9e2af88);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* --- Stato --- */
  .barra-stato {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 0.6rem;
    background: #181c25;
    border-radius: 6px;
    border: 1px solid #252a35;
  }
  .indicatore {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #585b70;
    transition: background 0.3s;
  }
  .indicatore.pronto { background: #33ff33; box-shadow: 0 0 6px #33ff3388; }
  .indicatore.in-attesa { background: #aaaa33; }
  .indicatore.nessun-volto { background: #aa3333; box-shadow: 0 0 5px #aa333388; }
  .stato-testo { font-size: 0.68rem; color: #6c7086; }

  /* --- Pulsanti --- */
  .pulsanti { display: flex; gap: 0.4rem; }
  button {
    padding: 0.35rem 0.8rem;
    border: none;
    border-radius: 5px;
    font-size: 0.72rem;
    cursor: pointer;
    background: #313244;
    color: #cdd6f4;
    transition: background 0.2s;
  }
  button:hover { background: #45475a; }
  button.avvia { background: #33ff33; color: #0a0a0a; font-weight: 600; }
  button.avvia:hover { background: #44ff44; }

  .errore-box {
    padding: 0.4rem 0.7rem;
    background: #2a1b1b;
    border-radius: 5px;
    color: #f38ba8;
    font-size: 0.72rem;
    display: none;
    text-align: center;
  }

  @media (max-width: 800px) {
    .layout { flex-direction: column; align-items: stretch; }
    .colonna-destra { width: 100%; }
  }
</style>
</head>
<body>

<h1>Monitoraggio Battito Cardiaco</h1>
<p class="sottotitolo">Fotopletismografia da webcam in tempo reale</p>

<div class="layout">
  <div class="colonna-sinistra">
    <div class="contenitore-video">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="risultato"></canvas>
    </div>

    <div class="ecg-monitor">
      <div class="ecg-header">
        <span class="ecg-label">PPG - Pleth</span>
        <span class="ecg-bpm in-attesa" id="bpm">---</span>
      </div>
      <canvas id="ecgCanvas"></canvas>
    </div>

    <div class="barra-stato">
      <span class="indicatore" id="indicatore"></span>
      <span class="stato-testo" id="statoTesto">In attesa...</span>
    </div>

    <div class="pulsanti">
      <button id="btnAvvia" class="avvia">Avvia webcam</button>
      <button id="btnReset">Reset</button>
      <button id="btnSalva">Salva screenshot</button>
    </div>

    <div class="errore-box" id="errore"></div>
  </div>

  <div class="colonna-destra">
    <div class="pannello-illuminazione">
      <div class="pannello-titolo">Illuminazione</div>
      <div class="luce-riga">
        <span class="luce-etichetta">Tipo</span>
        <span class="luce-valore" id="luceTipo">---</span>
      </div>
      <div class="luce-riga">
        <span class="luce-etichetta">Temperatura</span>
        <span class="luce-valore" id="luceTemp">--- K</span>
      </div>
      <div class="luce-riga">
        <span class="luce-etichetta">Luminosita</span>
        <span class="luce-valore" id="luceLum">---</span>
      </div>
      <div class="barra-luminosita">
        <div class="barra-luminosita-fill" id="barraLum" style="width:0%"></div>
      </div>
      <div class="luce-riga">
        <span class="luce-etichetta">Flicker</span>
        <span class="luce-valore" id="luceFreq">---</span>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const video       = document.getElementById('video');
  const canvas      = document.getElementById('risultato');
  const ctx         = canvas.getContext('2d');
  const bpmEl       = document.getElementById('bpm');
  const indicatore  = document.getElementById('indicatore');
  const statoTesto  = document.getElementById('statoTesto');
  const erroreEl    = document.getElementById('errore');
  const btnAvvia    = document.getElementById('btnAvvia');
  const btnReset    = document.getElementById('btnReset');
  const btnSalva    = document.getElementById('btnSalva');
  const ecgCanvas   = document.getElementById('ecgCanvas');
  const ecgCtx      = ecgCanvas.getContext('2d');

  const luceTipo  = document.getElementById('luceTipo');
  const luceTemp  = document.getElementById('luceTemp');
  const luceLum   = document.getElementById('luceLum');
  const barraLum  = document.getElementById('barraLum');
  const luceFreq  = document.getElementById('luceFreq');

  const LARGHEZZA = 320;
  const ALTEZZA   = 240;
  const AREA_LARG = 160;
  const AREA_ALT  = 120;
  const INTERVALLO_MS = 1000 / 15;

  canvas.width  = LARGHEZZA;
  canvas.height = ALTEZZA;

  /* --- ECG (160px fissi) --- */
  const dpr = window.devicePixelRatio || 1;
  const ECG_H = 160;
  let ecgW = 600;
  let ecgBuffer = null;
  let ecgIndice = 0;
  let ecgCursorX = 0;

  function ecgInizializza() {
    const rect = ecgCanvas.getBoundingClientRect();
    ecgW = Math.max(Math.round(rect.width), 100);
    ecgCanvas.width  = ecgW * dpr;
    ecgCanvas.height = ECG_H * dpr;
    ecgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ecgBuffer = new Float32Array(ecgW).fill(0);
    ecgIndice = 0;
    ecgCursorX = 0;
  }

  function ecgRidimensiona() {
    const vecchio = ecgBuffer;
    const vecchioW = vecchio ? vecchio.length : 0;
    ecgInizializza();
    if (vecchio && vecchioW > 0) {
      const copia = Math.min(vecchioW, ecgW);
      for (let i = 0; i < copia; i++)
        ecgBuffer[ecgW - copia + i] = vecchio[(vecchioW - copia + i) % vecchioW];
    }
    ecgRidisegna();
  }

  function ecgDisegnaGriglia() {
    ecgCtx.strokeStyle = '#0f1f0f';
    ecgCtx.lineWidth = 0.5;
    for (let x = 0; x < ecgW; x += 20) { ecgCtx.beginPath(); ecgCtx.moveTo(x, 0); ecgCtx.lineTo(x, ECG_H); ecgCtx.stroke(); }
    for (let y = 0; y < ECG_H; y += 20) { ecgCtx.beginPath(); ecgCtx.moveTo(0, y); ecgCtx.lineTo(ecgW, y); ecgCtx.stroke(); }
    ecgCtx.strokeStyle = '#1a3a1a';
    ecgCtx.lineWidth = 0.8;
    for (let x = 0; x < ecgW; x += 100) { ecgCtx.beginPath(); ecgCtx.moveTo(x, 0); ecgCtx.lineTo(x, ECG_H); ecgCtx.stroke(); }
    for (let y = 0; y < ECG_H; y += 100) { ecgCtx.beginPath(); ecgCtx.moveTo(0, y); ecgCtx.lineTo(ecgW, y); ecgCtx.stroke(); }
  }

  function ecgAggiungiValori(valori) {
    if (!valori || valori.length === 0 || !ecgBuffer) return;
    for (let i = 0; i < valori.length; i++) {
      ecgBuffer[ecgIndice] = valori[i];
      ecgIndice = (ecgIndice + 1) % ecgW;
      ecgCursorX = ecgIndice;
    }
  }

  function ecgRidisegna() {
    if (!ecgBuffer) return;
    ecgCtx.clearRect(0, 0, ecgW, ECG_H);
    ecgCtx.fillStyle = '#0a0a0a';
    ecgCtx.fillRect(0, 0, ecgW, ECG_H);
    ecgDisegnaGriglia();

    const centroY = ECG_H / 2;
    const scala = ECG_H * 0.003;

    ecgCtx.save();
    ecgCtx.globalAlpha = 0.12;
    ecgCtx.strokeStyle = '#003300';
    ecgCtx.lineWidth = 4;
    ecgCtx.beginPath();
    let primo = true;
    for (let i = 0; i < ecgW; i++) {
      const idx = (ecgCursorX + 1 + i) % ecgW;
      const y = centroY - ecgBuffer[idx] * scala;
      if (primo) { ecgCtx.moveTo(i, y); primo = false; } else ecgCtx.lineTo(i, y);
    }
    ecgCtx.stroke();
    ecgCtx.restore();

    ecgCtx.strokeStyle = '#33ff33';
    ecgCtx.lineWidth = 1.8;
    ecgCtx.shadowColor = '#33ff33';
    ecgCtx.shadowBlur = 6;
    ecgCtx.beginPath();
    let p = true;
    for (let i = 0; i < ecgW; i++) {
      const idx = (ecgCursorX + 1 + i) % ecgW;
      const y = centroY - ecgBuffer[idx] * scala;
      if (p) { ecgCtx.moveTo(i, y); p = false; } else ecgCtx.lineTo(i, y);
    }
    ecgCtx.stroke();
    ecgCtx.shadowBlur = 0;

    const xCur = ecgW - 1;
    const yCur = centroY - ecgBuffer[ecgCursorX % ecgW] * scala;
    ecgCtx.beginPath();
    ecgCtx.arc(xCur, yCur, 3, 0, Math.PI * 2);
    ecgCtx.fillStyle = '#33ff33';
    ecgCtx.shadowColor = '#33ff33';
    ecgCtx.shadowBlur = 10;
    ecgCtx.fill();
    ecgCtx.shadowBlur = 0;

    ecgCtx.fillStyle = '#0a0a0a';
    ecgCtx.fillRect(ecgW - 25, 0, 25, ECG_H);
  }

  /* --- Stato --- */
  let flusso = null, timer = null, inEsecuzione = false, bpmCorrente = '---';

  function aggIlluminazione(d) {
    if (!d) return;
    luceTipo.textContent = d.tipo || '---';
    luceTipo.className = 'luce-valore ' + (d.tipo ? (d.tipo.toLowerCase().includes('neon')||d.tipo.toLowerCase().includes('fluoresc')?'neon':d.tipo.toLowerCase().includes('incandesc')?'incandescente':d.tipo.toLowerCase().includes('naturale')||d.tipo.toLowerCase().includes('diurn')?'naturale':'neutro') : '');
    luceTemp.textContent = (d.temperatura_cct||'---')+' K';
    luceLum.textContent = d.luminosita != null ? Math.round(d.luminosita)+'/255' : '---';
    barraLum.style.width = ((d.luminosita||0)/255*100)+'%';
    luceFreq.textContent = d.frequenza_rilevata ? d.frequenza_hz+' Hz' : 'Nessun flicker';
    luceFreq.className = 'luce-valore ' + (d.frequenza_rilevata ? 'neon' : 'naturale');
  }

  function aggStato(viso, pronto, bpm, sopra150) {
    if (!viso) {
      indicatore.className = 'indicatore nessun-volto';
      statoTesto.textContent = 'Nessun volto rilevato';
      bpmEl.textContent = '---';
      bpmEl.className = 'ecg-bpm nessun-volto';
    } else if (pronto && bpm > 0) {
      indicatore.className = 'indicatore pronto';
      statoTesto.textContent = 'Monitoraggio attivo';
      if (sopra150) {
        bpmCorrente = '>150';
        bpmEl.textContent = '> 150 BPM';
      } else {
        bpmCorrente = Math.round(bpm);
        bpmEl.textContent = bpmCorrente + ' BPM';
      }
      bpmEl.className = 'ecg-bpm';
    } else {
      indicatore.className = 'indicatore in-attesa';
      statoTesto.textContent = 'Calcolo in corso...';
      bpmEl.textContent = '...';
      bpmEl.className = 'ecg-bpm in-attesa';
    }
  }

  async function avviaWebcam() {
    ferma();
    try {
      flusso = await navigator.mediaDevices.getUserMedia({
        video: { width: { exact: LARGHEZZA }, height: { exact: ALTEZZA }, frameRate: { ideal: 15 } }
      });
      video.srcObject = flusso;
      await video.play();
      btnAvvia.textContent = 'Ferma';
      nascondiErrore();
      avviaElaborazione();
    } catch (err) {
      let msg = 'Impossibile accedere alla webcam. ';
      if (err.name === 'NotAllowedError') msg += 'Permesso negato.';
      else if (err.name === 'NotFoundError') msg += 'Nessuna webcam trovata.';
      else msg += err.message;
      mostraErrore(msg);
      btnAvvia.textContent = 'Avvia webcam';
    }
  }

  function ferma() {
    if (timer) { clearInterval(timer); timer = null; }
    inEsecuzione = false;
    if (flusso) { flusso.getTracks().forEach(t => t.stop()); flusso = null; }
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    btnAvvia.textContent = 'Avvia webcam';
  }

  function resetta() {
    ferma();
    if (ecgBuffer) ecgBuffer.fill(0);
    ecgIndice = 0; ecgCursorX = 0;
    ecgRidisegna();
    bpmCorrente = '---';
    bpmEl.textContent = '---';
    bpmEl.className = 'ecg-bpm in-attesa';
    indicatore.className = 'indicatore';
    statoTesto.textContent = 'In attesa...';
    luceTipo.textContent = '---';
    luceTemp.textContent = '--- K';
    luceLum.textContent = '---';
    barraLum.style.width = '0%';
    luceFreq.textContent = '---';
    luceFreq.className = 'luce-valore';
    fetch('/api/reset', { method: 'POST' }).catch(() => {});
  }

  function avviaElaborazione() {
    inEsecuzione = true;
    if (ecgBuffer) ecgBuffer.fill(0);
    ecgIndice = 0; ecgCursorX = 0;

    const off = document.createElement('canvas');
    off.width  = LARGHEZZA;
    off.height = ALTEZZA;
    const offCtx = off.getContext('2d');
    let inAttesa = false;

    timer = setInterval(() => {
      if (!inEsecuzione || inAttesa) return;
      inAttesa = true;
      offCtx.drawImage(video, 0, 0, LARGHEZZA, ALTEZZA);
      off.toBlob((blob) => {
        if (!blob) { inAttesa = false; return; }
        blobParaBase64(blob).then((b64) => {
          fetch('/api/elabora', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ immagine: b64 })
          }).then(r => r.json()).then((d) => {
            if (d.errore) { inAttesa = false; return; }
            aggIlluminazione(d.illuminazione);
            aggStato(d.viso_rilevato, d.pronto, d.bpm, d.bpm_sopra_150);
            if (!d.viso_rilevato) {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              if (ecgBuffer) ecgBuffer.fill(0);
              ecgIndice = 0; ecgCursorX = 0;
              ecgRidisegna();
              inAttesa = false; return;
            }
            if (d.roi) {
              const img = new Image();
              img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const ox = LARGHEZZA/2 - AREA_LARG/2;
                const oy = ALTEZZA/2 - AREA_ALT/2;
                ctx.drawImage(img, ox, oy, AREA_LARG, AREA_ALT);
                ctx.strokeStyle = 'rgba(51,255,51,0.6)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(ox, oy, AREA_LARG, AREA_ALT);
                inAttesa = false;
              };
              img.onerror = () => { inAttesa = false; };
              img.src = 'data:image/jpeg;base64,' + d.roi;
            } else { inAttesa = false; }
            if (d.ppg && d.ppg.length > 0) ecgAggiungiValori(d.ppg);
            ecgRidisegna();
          }).catch(() => { inAttesa = false; });
        }).catch(() => { inAttesa = false; });
      }, 'image/jpeg', 0.8);
    }, INTERVALLO_MS);
  }

  function blobParaBase64(blob) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onloadend = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(blob);
    });
  }

  function salvaScreenshot() {
    const t = document.createElement('canvas');
    t.width  = LARGHEZZA;
    t.height = ALTEZZA;
    const tCtx = t.getContext('2d');
    tCtx.drawImage(video, 0, 0);
    tCtx.drawImage(canvas, 0, 0);
    tCtx.strokeStyle = 'rgba(51,255,51,0.6)';
    tCtx.lineWidth = 1.5;
    tCtx.strokeRect(LARGHEZZA/2-AREA_LARG/2, ALTEZZA/2-AREA_ALT/2, AREA_LARG, AREA_ALT);
    tCtx.fillStyle = '#33ff33';
    tCtx.font = 'bold 18px monospace';
    tCtx.fillText(bpmCorrente+' BPM', 10, 25);
    const l = document.createElement('a');
    l.download = 'battito_'+Date.now()+'.png';
    l.href = t.toDataURL('image/png');
    l.click();
  }

  function mostraErrore(m) { erroreEl.textContent = m; erroreEl.style.display = 'block'; }
  function nascondiErrore() { erroreEl.style.display = 'none'; }

  btnAvvia.addEventListener('click', () => { if (flusso && flusso.active) ferma(); else avviaWebcam(); });
  btnReset.addEventListener('click', resetta);
  btnSalva.addEventListener('click', salvaScreenshot);
  window.addEventListener('resize', ecgRidimensiona);

  ecgInizializza();
  ecgRidisegna();
})();
</script>
</body>
</html>
